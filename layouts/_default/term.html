{{ define "main" }}

{{ .Content }}

<h1>{{ .Title }}</h1>

<div style="margin-bottom: 2rem;"></div>

<section class="posts-list">
  {{ range .Pages.ByDate.Reverse }}
    {{ partial "main/dates.html" . }}
    <h2 class="term-post-title">
      <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
    </h2>
  {{ end }}
</section>

{{ end }}
