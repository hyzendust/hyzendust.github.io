baseURL = 'https://freedoms4.org'
languageCode = 'en-us'
title = 'Freedoms4'
theme = 'hugo-theme-yue'
publishDir = "docs"

[module]
[[module.mounts]]
source = "content"
target = "content"
[[module.mounts]]
source = "changelog"
target = "content/changelog"
[[module.mounts]]
source = "terms"
target = "content/terms"
[[module.mounts]]
source = "privacy"
target = "content/privacy"
[[module.mounts]]
source = "search-results"
target = "content/search-results"
[[module.mounts]]
source = "coming-soon"
target = "content/coming-soon"
[[module.mounts]]
source = "contact"
target = "content/contact"
[[module.mounts]]
source = "login"
target = "content/login"
[[module.mounts]]
source = "signup"
target = "content/signup"
[[module.mounts]]
source = "admin"
target = "content/admin"
[[module.mounts]]
source = "uninotes/semester"
target = "content/semester"
[[module.mounts]]
source = "uninotes/subjectcode"
target = "content/subjectcode"
[[module.mounts]]
source = "blog/categories"
target = "content/categories"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true

[params]
dateFormat = "Posted on: January 2, 2006"
customCSS = ["css/custom.css"]

[params.author]
name = "Freedoms4"
email = "your-email@example.com"

[caches]
[caches.images]
dir = ':cacheDir/images'

[outputs]
home = ["HTML", "RSS", "JSON"]

[menu]

[[menu.main]]
identifier = "landing"
name = "Home"
url = "/"
weight = 1

[[menu.main]]
identifier = "blogs"
name = "Blog"
url = "/blog/"
weight = 2

[[menu.main]]
identifier = "services"
name = "Services"
url = "/services/"
weight = 3

[[menu.main]]
identifier = "uninotes"
name = "UniNotes"
url = "/uninotes/"
weight = 4

[[menu.main]]
identifier = "contact"
name = "Contact"
url = "/contact/"
weight = 5

[taxonomies]
category = "categories"
tag = "tags"
semester = "semester"
subjectcode = "subjectcode"

[permalinks]
[permalinks.term]
semester = '/uninotes/:slug/'
subjectcode = '/uninotes/:slug/'
[[module.mounts]]
source = "layouts"
target = "layouts"
[[module.mounts]]
source = "static"
target = "static"
[[module.mounts]]
source = "assets"
target = "assets"
[[module.mounts]]
source = "data"
target = "data"
[[module.mounts]]
source = "i18n"
target = "i18n"
[[module.mounts]]
source = "archetypes"
target = "archetypes"
