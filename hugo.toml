baseURL = 'https://freedoms4.org'
languageCode = 'en-us'
title = 'Freedoms4'
theme = 'hugo-theme-yue'
publishDir = "docs"

[module]
[[module.mounts]]
  source = "content"
  target = "content"
[[module.mounts]]
  source = "changelog"
  target = "content/changelog"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true

[params]
dateFormat = "Posted on: January 2, 2006"
customCSS = ["css/custom.css"]

[params.author]
name = "Freedoms4"
email = "your-email@example.com"

[caches]
[caches.images]
dir = ':cacheDir/images'

[menu]

[[menu.main]]
identifier = "landing"
name = "Home"
url = "/"
weight = 1

[[menu.main]]
identifier = "blogs"
name = "Blog"
url = "/blog/"
weight = 2

[[menu.main]]
identifier = "services"
name = "Services"
url = "/services/"
weight = 3

[[menu.main]]
identifier = "uninotes"
name = "UniNotes"
url = "/uninotes/"
weight = 4

[[menu.main]]
identifier = "contact"
name = "Contact"
url = "/contact/"
weight = 5

[taxonomies]
category = "categories"
tag = "tags"
semester = "semester"
subjectcode = "subjectcode"

[permalinks]
  [permalinks.term]
    semester    = '/uninotes/:slug/'
    subjectcode = '/uninotes/:slug/'
[[module.mounts]]
  source = "layouts"
  target = "layouts"
[[module.mounts]]
  source = "static"
  target = "static"
[[module.mounts]]
  source = "assets"
  target = "assets"
[[module.mounts]]
  source = "data"
  target = "data"
[[module.mounts]]
  source = "i18n"
  target = "i18n"
[[module.mounts]]
  source = "archetypes"
  target = "archetypes"
