{{ if or .NextInSection .PrevInSection }}
  <nav class="page-nav">
    {{ with .NextInSection }}
      <a class="page-nav__previous-link" href="{{ .RelPermalink }}">
        {{ i18n "previousPage" }}{{ .Title }}
      </a>
    {{ end }}

    {{ with .PrevInSection }}
      <a class="page-nav__next-link" href="{{ .RelPermalink }}">
        {{ i18n "nextPage" }}{{ .Title }}
      </a>
    {{ end }}
  </nav>
{{ end }}
